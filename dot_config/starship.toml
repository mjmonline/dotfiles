"$schema" = 'https://starship.rs/config-schema.json'

palette = 'synthwave'

format = """
$directory\
[¯é░](bg:pill_secondary fg:pill_primary)\
$git_branch\
$git_status\
[¯é┤ ](fg:pill_secondary)\
$character"""

right_format = """
$cmd_duration\
$time\
"""

[directory]
style = "bg:pill_primary fg:pill_primary_text"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[git_branch]
symbol = "´Éİ"
style = "fg:pill_secondary_text bg:pill_secondary"
format = '[ $symbol $branch ]($style)'

[git_status]
format = '([ $conflicted$stashed$deleted$renamed$modified$typechanged$staged$untracked$ahead_behind ]($style))'
style = "bg:pill_secondary"
conflicted    = "[=${count}](fg:danger bg:pill_secondary)"
stashed       = "[\\$${count}](fg:info bg:pill_secondary)"
deleted       = "[Ô£İ${count}](fg:danger bg:pill_secondary)"
renamed       = "[┬╗${count}](fg:accent bg:pill_secondary)"
modified      = "[!${count}](fg:warning bg:pill_secondary)"
typechanged   = "[┬▒${count}](fg:attention bg:pill_secondary)"
staged        = "[+${count}](fg:success bg:pill_secondary)"
untracked     = "[?${count}](fg:notice bg:pill_secondary)"
ahead         = "[Ôçí${count}](fg:success bg:pill_secondary)"
behind        = "[Ôçú${count}](fg:attention bg:pill_secondary)"
diverged      = "[Ôçí${count_ahead}Ôçú${count_behind}](fg:info bg:pill_secondary)"

[time]
disabled = false
time_format = "%R"
style = "fg:muted"
format = '[ ´É║ $time ]($style)'

[character]
disabled = false
success_symbol = '[ÔØ»](bold fg:green)'
error_symbol = '[ÔØ»](bold fg:red)'

[cmd_duration]
style = "fg:notice"
format = '[´öá $duration ]($style)'

[palettes.night_owl]
pill_primary = "#82aaff"
pill_primary_text = "#011627"
pill_secondary = "#1d3b53"
